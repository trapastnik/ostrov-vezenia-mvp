name: Deploy Ostrov Vezeniya

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'nginx/**'
      - 'docker-compose.prod.yml'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/ostrov-vezeniya
            git pull origin main

            # Rebuild admin if changed
            if git diff --name-only HEAD~1 | grep -q '^admin/'; then
              echo ">>> Rebuilding admin..."
              cd admin && npm ci --silent && npm run build && cd ..
            fi

            # Rebuild and restart containers if backend/docker changed
            if git diff --name-only HEAD~1 | grep -qE '^(backend/|docker-compose|nginx/)'; then
              echo ">>> Rebuilding containers..."
              docker compose -f docker-compose.prod.yml build --no-cache
              docker compose -f docker-compose.prod.yml up -d
            fi

            # Cleanup
            docker image prune -f

            # Health check
            sleep 5
            curl -sf http://localhost/health || echo "WARNING: health check failed"
