services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ostrov
      POSTGRES_USER: ostrov
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ostrov"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://ostrov:${DB_PASSWORD}@db:5432/ostrov
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - default
      - proxy

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://ostrov:${DB_PASSWORD}@db:5432/ostrov
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./admin/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: always
    networks:
      - default
      - proxy
    labels:
      # API
      - "traefik.enable=true"
      - "traefik.http.routers.post-api.rule=Host(`api.ostrov-vezeniya.ru`)"
      - "traefik.http.routers.post-api.entrypoints=websecure"
      - "traefik.http.routers.post-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.post-api.loadbalancer.server.port=80"
      # Admin panel
      - "traefik.http.routers.post-admin.rule=Host(`admin.ostrov-vezeniya.ru`)"
      - "traefik.http.routers.post-admin.entrypoints=websecure"
      - "traefik.http.routers.post-admin.tls.certresolver=letsencrypt"
      # Доступ по IP (временно, пока нет DNS)
      - "traefik.http.routers.post-ip.rule=PathPrefix(`/api`) || PathPrefix(`/shop`) || PathPrefix(`/health`)"
      - "traefik.http.routers.post-ip.entrypoints=websecure"
      - "traefik.http.routers.post-ip.priority=10"

volumes:
  postgres_data:

networks:
  proxy:
    external: true
